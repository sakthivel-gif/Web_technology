<!DOCTYPE html>
<html>
<head>

<title>User Information</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="card">

<h2>User Information Form</h2>

<form action="UserServlet" method="post">

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
